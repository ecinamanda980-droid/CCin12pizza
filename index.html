<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzaKu - Toko Pizza</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #fff5f0;
}

/* NAVBAR */
.navbar {
  background: #d32f2f;
  color: white;
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  align-items: center;
}
.navbar a {
  color: white;
  text-decoration: none;
  margin-left: 15px;
}

/* HERO */
.hero {
  background: url('https://images.unsplash.com/photo-1601924582975-7d43d2fbb8cb') center/cover;
  height: 300px;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}
.hero h1 {
  font-size: 40px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
}

/* PRODUCT */
.container {
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card:hover {
  transform: translateY(-5px);
}

.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
  text-align: center;
}

.price {
  color: #d32f2f;
  font-weight: bold;
}

.btn {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 12px;
  background: #ff9800;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

/* FOOTER */
.footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 10px;
  margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .navbar {
    flex-direction: column;
    text-align: center;
  }

  .hero h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <b>🍕 PizzaKu</b>
  <div>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Kontak</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Pizza Lezat & Fresh 🔥</h1>
</div>

<!-- PRODUCT -->
<div class="container">
  <h2>Menu Favorit</h2>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1593560708920-61dd98c46a4e">
      <div class="card-content">
        <h4>Pepperoni Pizza</h4>
        <p class="price">Rp 85.000</p>
        <a href="#" class="btn">Pesan</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953c">
      <div class="card-content">
        <h4>Cheese Pizza</h4>
        <p class="price">Rp 75.000</p>
        <a href="#" class="btn">Pesan</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <div class="card-content">
        <h4>Spicy Pizza</h4>
        <p class="price">Rp 90.000</p>
        <a href="#" class="btn">Pesan</a>
      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <p>© 2026 PizzaKu</p>
</div>

</body>
</html>
